<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VitalCheck - Fingertip Heart Rate & SpO2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0a0f1d 0%, #0f1629 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 32px;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subhead {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .instruction {
            background: rgba(96,165,250,0.1);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #cbd5e1;
        }
        .instruction span {
            background: #3b82f6;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            color: white;
            margin: 0 4px;
        }
        video {
            width: 100%;
            border-radius: 24px;
            background: #000;
            margin-bottom: 20px;
            aspect-ratio: 1;
            object-fit: cover;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 48px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            display: none;
        }
        .result.show { display: block; }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .metric:last-child { border-bottom: none; }
        .metric-label { color: #9ca3af; font-size: 14px; }
        .metric-value { font-size: 28px; font-weight: 700; color: #f3f4f6; }
        .status {
            text-align: center;
            margin: 16px 0;
            color: #86efac;
            font-size: 14px;
        }
        .status.error { color: #f87171; }
        .privacy-note {
            text-align: center;
            font-size: 11px;
            color: #4b5563;
            margin-top: 16px;
        }
        canvas {
            width: 100%;
            height: 80px;
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            margin-top: 16px;
        }
        .debug {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 8px;
            font-family: monospace;
            font-size: 9px;
            color: #6b7280;
            margin-top: 16px;
            text-align: left;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 VitalCheck</h1>
        <div class="subhead">Fingertip measurement • 30 seconds</div>
        
        <div class="instruction">
            📱 <span>1</span> Place finger on back camera<br>
            <span>2</span> Cover the flash (Android only)<br>
            <span>3</span> Stay still for 30 seconds
        </div>
        
        <video id="video" autoplay playsinline muted></video>
        <button id="startBtn">Start Measurement</button>
        <div id="status" class="status">Ready</div>
        
        <div id="results" class="result">
            <div class="metric">
                <span class="metric-label">❤️ Heart Rate</span>
                <span class="metric-value" id="hr">-- BPM</span>
            </div>
            <div class="metric">
                <span class="metric-label">🔄 HRV (SDNN)</span>
                <span class="metric-value" id="hrv">-- ms</span>
            </div>
            <div class="metric">
                <span class="metric-label">🫀 SpO₂</span>
                <span class="metric-value" id="spo2">-- %</span>
            </div>
        </div>
        
        <canvas id="waveform"></canvas>
        
        <div class="privacy-note">🔒 All processing happens on your device. No data uploaded.</div>
        <div id="debug" class="debug"></div>
    </div>

    <script>
        // ============================================================
        // VITALCHECK - FINGERTIP PPG (Heart Rate + SpO2)
        // Built by you. Works on Android Chrome.
        // ============================================================
        
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        const debugDiv = document.getElementById('debug');
        const canvas = document.getElementById('waveform');
        const ctx = canvas.getContext('2d');
        
        let stream = null;
        let track = null;
        let recording = false;
        let frames = [];
        let heartRate = null;
        let hrv = null;
        let spo2 = null;
        
        function logDebug(msg) {
            const time = new Date().toLocaleTimeString();
            console.log(`[${time}] ${msg}`);
            debugDiv.innerHTML = `${time}: ${msg}<br>${debugDiv.innerHTML}`;
            if (debugDiv.innerHTML.split('<br>').length > 30) {
                const lines = debugDiv.innerHTML.split('<br>');
                debugDiv.innerHTML = lines.slice(0, 25).join('<br>');
            }
        }
        
        // Initialize camera
        async function initCamera() {
            try {
                logDebug('Requesting camera...');
                statusDiv.textContent = '📷 Opening camera...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: 'environment' }, // back camera
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                
                video.srcObject = stream;
                await new Promise((resolve) => video.onloadedmetadata = resolve);
                await video.play();
                
                // Try to enable flash/torch
                track = stream.getVideoTracks()[0];
                if (track && track.getCapabilities().torch) {
                    await track.applyConstraints({ advanced: [{ torch: true }] });
                    logDebug('Flash enabled');
                } else {
                    logDebug('Flash not supported on this device');
                }
                
                logDebug('Camera ready - back camera');
                statusDiv.textContent = '✅ Ready. Place finger on camera.';
                return true;
            } catch (err) {
                logDebug(`Camera error: ${err.message}`);
                statusDiv.textContent = '❌ Back camera required. Please allow access.';
                statusDiv.classList.add('error');
                return false;
            }
        }
        
        // Extract red channel average from video frame
        function captureFrame() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // Get center region (where finger should be)
            const centerX = Math.floor(canvas.width / 2);
            const centerY = Math.floor(canvas.height / 2);
            const radius = Math.floor(Math.min(canvas.width, canvas.height) / 6);
            
            let redSum = 0;
            let greenSum = 0;
            let blueSum = 0;
            let pixelCount = 0;
            
            for (let y = centerY - radius; y < centerY + radius; y++) {
                for (let x = centerX - radius; x < centerX + radius; x++) {
                    if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                        const idx = (y * canvas.width + x) * 4;
                        redSum += data[idx];
                        greenSum += data[idx + 1];
                        blueSum += data[idx + 2];
                        pixelCount++;
                    }
                }
            }
            
            return {
                red: redSum / pixelCount,
                green: greenSum / pixelCount,
                blue: blueSum / pixelCount
            };
        }
        
        // Calculate heart rate from PPG signal
        function calculateHeartRate(signal, sampleRate) {
            if (signal.length < sampleRate * 2) return null;
            
            // Simple peak detection
            const peaks = [];
            const threshold = (Math.max(...signal) + Math.min(...signal)) / 2;
            
            for (let i = 1; i < signal.length - 1; i++) {
                if (signal[i] > threshold && signal[i] > signal[i-1] && signal[i] > signal[i+1]) {
                    peaks.push(i);
                }
            }
            
            if (peaks.length < 2) return null;
            
            // Calculate average RR interval
            let totalInterval = 0;
            for (let i = 1; i < peaks.length; i++) {
                totalInterval += (peaks[i] - peaks[i-1]) / sampleRate;
            }
            const avgRR = totalInterval / (peaks.length - 1);
            
            // Heart rate in BPM
            const hr = Math.round(60 / avgRR);
            
            // HRV (SDNN) - standard deviation of RR intervals
            let rrIntervals = [];
            for (let i = 1; i < peaks.length; i++) {
                rrIntervals.push((peaks[i] - peaks[i-1]) / sampleRate);
            }
            const meanRR = rrIntervals.reduce((a,b) => a + b, 0) / rrIntervals.length;
            const sdnn = Math.sqrt(rrIntervals.map(rr => Math.pow(rr - meanRR, 2)).reduce((a,b) => a + b, 0) / rrIntervals.length);
            
            return { hr, hrv: Math.round(sdnn * 1000) };
        }
        
        // Draw waveform in real-time
        function drawWaveform(signal) {
            if (!ctx) return;
            canvas.width = canvas.clientWidth;
            canvas.height = 80;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#22d3ee';
            ctx.lineWidth = 2;
            
            if (signal.length < 2) return;
            
            const slice = signal.slice(-canvas.width);
            for (let i = 0; i < slice.length; i++) {
                const x = i;
                const y = canvas.height / 2 + (slice[i] - 128) / 2;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }
        
        async function startMeasurement() {
            logDebug('Starting measurement...');
            
            if (!stream) {
                const ok = await initCamera();
                if (!ok) return;
            }
            
            recording = true;
            startBtn.disabled = true;
            statusDiv.textContent = '🔴 Measuring... 30 seconds. Keep finger still.';
            resultsDiv.classList.remove('show');
            
            frames = [];
            const redSignal = [];
            const greenSignal = [];
            const blueSignal = [];
            
            // Record for 30 seconds at ~30fps
            const duration = 30000;
            const interval = 33; // ~30fps
            const startTime = Date.now();
            let secondsLeft = 30;
            
            const countdownInterval = setInterval(() => {
                secondsLeft--;
                if (secondsLeft > 0) {
                    statusDiv.textContent = `🔴 Measuring... ${secondsLeft}s left. Keep finger still.`;
                }
            }, 1000);
            
            while (Date.now() - startTime < duration) {
                if (!recording) break;
                
                const frame = captureFrame();
                redSignal.push(frame.red);
                greenSignal.push(frame.green);
                blueSignal.push(frame.blue);
                
                // Draw waveform
                drawWaveform(redSignal);
                
                await new Promise(resolve => setTimeout(resolve, interval));
            }
            
            clearInterval(countdownInterval);
            logDebug(`Captured ${redSignal.length} frames`);
            
            // Calculate results
            const sampleRate = redSignal.length / 30; // frames per second
            const result = calculateHeartRate(redSignal, sampleRate);
            
            if (result && result.hr) {
                heartRate = result.hr;
                hrv = result.hrv;
                
                // Estimate SpO2 from red/green ratio (simplified)
                const avgRed = redSignal.reduce((a,b) => a + b, 0) / redSignal.length;
                const avgGreen = greenSignal.reduce((a,b) => a + b, 0) / greenSignal.length;
                const ratio = avgRed / avgGreen;
                // Rough SpO2 estimation (clinical calibration would be needed)
                spo2 = Math.min(100, Math.max(85, Math.round(100 - (ratio - 1) * 50)));
                
                document.getElementById('hr').innerHTML = heartRate + ' BPM';
                document.getElementById('hrv').innerHTML = hrv + ' ms';
                document.getElementById('spo2').innerHTML = spo2 + ' %';
                
                resultsDiv.classList.add('show');
                statusDiv.textContent = '✅ Complete!';
                logDebug(`Results: HR=${heartRate}, HRV=${hrv}, SpO2=${spo2}`);
            } else {
                statusDiv.textContent = '❌ Failed to detect pulse. Make sure finger covers camera completely.';
                statusDiv.classList.add('error');
                logDebug('Pulse detection failed - insufficient signal');
            }
            
            recording = false;
            startBtn.disabled = false;
        }
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (track && track.getCapabilities().torch) {
                track.applyConstraints({ advanced: [{ torch: false }] });
            }
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
        });
        
        startBtn.onclick = startMeasurement;
        
        // Auto-initialize
        if (window.isSecureContext) {
            initCamera();
        } else {
            statusDiv.textContent = '❌ HTTPS required';
            statusDiv.classList.add('error');
        }
    </script>
</body>
</html>
