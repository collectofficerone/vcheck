<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VitalCheck – Fixed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(145deg, #0a0f1d 0%, #0f1629 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 32px;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subhead {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 24px;
        }
        video {
            width: 100%;
            border-radius: 24px;
            background: #000;
            margin-bottom: 20px;
            aspect-ratio: 4/3;
            object-fit: cover;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 48px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            display: none;
        }
        .result.show { display: block; }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .metric:last-child { border-bottom: none; }
        .metric-label { color: #9ca3af; font-size: 14px; }
        .metric-value { font-size: 24px; font-weight: 700; color: #f3f4f6; }
        .status {
            text-align: center;
            margin: 16px 0;
            color: #86efac;
            font-size: 14px;
        }
        .status.error { color: #f87171; }
        .status.warning { color: #fbbf24; }
        .privacy-note {
            text-align: center;
            font-size: 11px;
            color: #4b5563;
            margin-top: 16px;
        }
        .debug {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 8px;
            font-family: monospace;
            font-size: 10px;
            color: #6b7280;
            margin-top: 16px;
            text-align: center;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 VitalCheck</h1>
        <div class="subhead">30 seconds • Works on slow networks • No app required</div>
        
        <video id="video" autoplay playsinline muted></video>
        <button id="startBtn">Start Health Scan</button>
        <div id="status" class="status">Ready</div>
        
        <div id="results" class="result">
            <div class="metric">
                <span class="metric-label">❤️ Heart Rate</span>
                <span class="metric-value" id="hr">-- BPM</span>
            </div>
            <div class="metric">
                <span class="metric-label">🔄 HRV (SDNN)</span>
                <span class="metric-value" id="hrv">-- ms</span>
            </div>
            <div class="metric">
                <span class="metric-label">🌬️ Respiration</span>
                <span class="metric-value" id="rr">-- /min</span>
            </div>
            <div class="metric">
                <span class="metric-label">⚡ Stress Level</span>
                <span class="metric-value" id="stress">-- %</span>
            </div>
        </div>
        
        <div class="privacy-note">🔒 Video processed locally — frames are discarded immediately</div>
        <div id="debug" class="debug"></div>
    </div>

    <script type="module">
        // Debug: Log when script starts
        console.log('Script loaded');
        document.getElementById('debug').innerHTML = 'Script loaded at ' + new Date().toLocaleTimeString() + '<br>';
        
        let VitalLens;
        try {
            const module = await import('https://cdn.jsdelivr.net/npm/vitallens@0.4.5/dist/vitallens.esm.js');
            VitalLens = module.VitalLens;
            console.log('VitalLens imported successfully');
            document.getElementById('debug').innerHTML += '✓ VitalLens loaded<br>';
        } catch (err) {
            console.error('Failed to load VitalLens:', err);
            document.getElementById('debug').innerHTML += `❌ Failed to load VitalLens: ${err.message}<br>`;
            document.getElementById('status').textContent = '❌ Failed to load library. Check network.';
            document.getElementById('status').classList.add('error');
        }
        
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        const debugDiv = document.getElementById('debug');
        
        let stream = null;
        let wakeLock = null;
        
        function logDebug(msg) {
            console.log(msg);
            debugDiv.innerHTML += `${new Date().toLocaleTimeString()}: ${msg}<br>`;
            // Keep last 20 lines
            const lines = debugDiv.innerHTML.split('<br>');
            if (lines.length > 25) {
                debugDiv.innerHTML = lines.slice(-20).join('<br>');
            }
        }
        
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    logDebug('✅ Wake Lock active');
                } catch (err) {
                    logDebug('⚠️ Wake Lock failed (non-critical): ' + err.message);
                }
            }
        }
        
        async function initCamera() {
            try {
                statusDiv.textContent = '📷 Requesting camera...';
                statusDiv.classList.remove('error', 'warning');
                logDebug('Requesting camera permission...');
                
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                logDebug('Camera stream obtained');
                
                video.srcObject = stream;
                await new Promise((resolve) => video.onloadedmetadata = resolve);
                await video.play();
                
                logDebug('✅ Camera ready');
                statusDiv.textContent = '✅ Camera ready. Tap Start.';
                return true;
            } catch (err) {
                logDebug(`❌ Camera error: ${err.message}`);
                statusDiv.textContent = `❌ Camera: ${err.message}`;
                statusDiv.classList.add('error');
                throw err;
            }
        }
        
        // Make sure button exists before adding click handler
        if (startBtn) {
            logDebug('Button found, attaching click handler');
            startBtn.onclick = async () => {
                logDebug('Button clicked!');
                
                if (!window.isSecureContext) {
                    logDebug('ERROR: Not a secure context');
                    statusDiv.textContent = '❌ HTTPS required';
                    statusDiv.classList.add('error');
                    return;
                }
                
                try {
                    if (!VitalLens) {
                        throw new Error('VitalLens library not loaded');
                    }
                    
                    if (!stream) {
                        logDebug('No camera stream, initializing...');
                        await initCamera();
                    }
                    
                    await requestWakeLock();
                    
                    statusDiv.textContent = '🔍 Scanning 30 seconds... Keep still';
                    statusDiv.classList.remove('error', 'warning');
                    startBtn.disabled = true;
                    logDebug('Starting VitalLens scan...');
                    
                    // IMPORTANT: YOU NEED A FRESH API KEY
                    // Get one from https://rouast.com/api
                    const scanner = new VitalLens({
                        apiKey: 'YOUR_FRESH_API_KEY_HERE',  // <-- REPLACE THIS
                        method: 'vitallens'
                    });
                    
                    logDebug('VitalLens instance created, calling analyze()');
                    
                    const scanPromise = scanner.analyze(video, { duration: 30000 });
                    const timeoutPromise = new Promise((_, reject) => 
                        setTimeout(() => reject(new Error('Network timeout (45s)')), 45000)
                    );
                    
                    const result = await Promise.race([scanPromise, timeoutPromise]);
                    logDebug('✅ Scan completed successfully');
                    
                    if (wakeLock) {
                        await wakeLock.release();
                        wakeLock = null;
                    }
                    
                    const hr = result.heartRate || result.vitals?.heart_rate?.value;
                    const hrv = result.hrv || result.vitals?.hrv_sdnn?.value;
                    const rr = result.respiratoryRate || result.vitals?.respiratory_rate?.value;
                    
                    let stress = '--';
                    if (hrv && !isNaN(hrv)) {
                        stress = Math.max(0, Math.min(100, Math.round(100 - (hrv / 80) * 100))) + '%';
                    }
                    
                    if (hr) document.getElementById('hr').innerHTML = Math.round(hr) + ' <span style="font-size:14px;color:#6b7280;">BPM</span>';
                    if (hrv) document.getElementById('hrv').innerHTML = Math.round(hrv) + ' <span style="font-size:14px;color:#6b7280;">ms</span>';
                    if (rr) document.getElementById('rr').innerHTML = Math.round(rr) + ' <span style="font-size:14px;color:#6b7280;">/min</span>';
                    if (stress !== '--') document.getElementById('stress').innerHTML = stress;
                    
                    resultsDiv.classList.add('show');
                    statusDiv.textContent = '✅ Scan complete!';
                    startBtn.disabled = false;
                    
                } catch (err) {
                    logDebug(`❌ Scan error: ${err.message}`);
                    logDebug(err.stack || 'No stack trace');
                    
                    if (wakeLock) {
                        try { await wakeLock.release(); } catch(e) {}
                        wakeLock = null;
                    }
                    
                    let errorMsg = err.message;
                    if (errorMsg.includes('403') || errorMsg.includes('Unauthorized')) {
                        errorMsg = 'Invalid API key. Get a fresh key from rouast.com/api';
                    } else if (errorMsg.includes('429')) {
                        errorMsg = 'API rate limit exceeded. Try again later.';
                    } else if (errorMsg.includes('timeout')) {
                        errorMsg = 'Network timeout. Check your connection.';
                    } else if (errorMsg.includes('load') || errorMsg.includes('import')) {
                        errorMsg = 'Failed to load library. Check your internet.';
                    }
                    
                    statusDiv.textContent = `❌ ${errorMsg}`;
                    statusDiv.classList.add('error');
                    startBtn.disabled = false;
                }
            };
        } else {
            logDebug('ERROR: startBtn not found in DOM');
        }
        
        // Check secure context
        if (!window.isSecureContext) {
            logDebug('ERROR: Not a secure context (HTTPS required)');
            statusDiv.textContent = '❌ HTTPS required for camera access';
            statusDiv.classList.add('error');
            if (startBtn) startBtn.disabled = true;
        } else {
            logDebug('✅ Secure context (HTTPS) detected');
        }
    </script>
</body>
</html>
