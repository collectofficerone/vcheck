<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalCheck - One Link Health Scan</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0a0f1d, #0f1629);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 28px;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .subhead {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 24px;
        }
        vitallens-scan {
            display: block;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
        }
        .footer {
            text-align: center;
            font-size: 11px;
            color: #4b5563;
            margin-top: 20px;
        }
        .api-notice {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 16px;
            padding: 12px;
            margin-top: 16px;
            font-size: 12px;
            color: #86efac;
            text-align: center;
        }
        .api-notice a {
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 VitalCheck</h1>
        <div class="subhead">60-second health scan • No app required</div>
        
        <!-- VitalLens Web Component - Does everything automatically -->
        <vitallens-scan 
            api-key="poY83wP0pI5rOTK1mUS4d3EzmqOmsEF1nh6yD3fa"
            text-ready="Ready"
            text-scanning="Scanning for face..."
            text-processing="Analyzing vitals..."
            text-complete="Complete!">
        </vitallens-scan>
        
        <div class="api-notice">
            🔑 Get your free API key at <a href="https://rouast.com" target="_blank">rouast.com</a><br>
            Free tier: 100 requests/month
        </div>
        
        <div class="footer">
            This is a wellness tool, not a medical device. Always consult a healthcare provider.
        </div>
    </div>

    <!-- Load VitalLens Web Component -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/vitallens/dist/vitallens.browser.js"></script>
</body>
</html>
