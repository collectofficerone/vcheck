<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VitalCheck – Fixed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(145deg, #0a0f1d 0%, #0f1629 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 32px;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subhead {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 24px;
        }
        video {
            width: 100%;
            border-radius: 24px;
            background: #000;
            margin-bottom: 20px;
            aspect-ratio: 4/3;
            object-fit: cover;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 48px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            display: none;
        }
        .result.show { display: block; }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .metric:last-child { border-bottom: none; }
        .metric-label { color: #9ca3af; font-size: 14px; }
        .metric-value { font-size: 24px; font-weight: 700; color: #f3f4f6; }
        .status {
            text-align: center;
            margin: 16px 0;
            color: #86efac;
            font-size: 14px;
        }
        .status.error { color: #f87171; }
        .status.warning { color: #fbbf24; }
        .privacy-note {
            text-align: center;
            font-size: 11px;
            color: #4b5563;
            margin-top: 16px;
        }
        .debug {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 8px;
            font-family: monospace;
            font-size: 10px;
            color: #6b7280;
            margin-top: 16px;
            text-align: center;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 VitalCheck</h1>
        <div class="subhead">30 seconds • Works on slow networks • No app required</div>
        
        <video id="video" autoplay playsinline muted></video>
        <button id="startBtn">Start Health Scan</button>
        <div id="status" class="status">Ready</div>
        
        <div id="results" class="result">
            <div class="metric">
                <span class="metric-label">❤️ Heart Rate</span>
                <span class="metric-value" id="hr">-- BPM</span>
            </div>
            <div class="metric">
                <span class="metric-label">🔄 HRV (SDNN)</span>
                <span class="metric-value" id="hrv">-- ms</span>
            </div>
            <div class="metric">
                <span class="metric-label">🌬️ Respiration</span>
                <span class="metric-value" id="rr">-- /min</span>
            </div>
            <div class="metric">
                <span class="metric-label">⚡ Stress Level</span>
                <span class="metric-value" id="stress">-- %</span>
            </div>
        </div>
        
        <div class="privacy-note">🔒 Video processed locally — frames are discarded immediately</div>
        <div id="debug" class="debug"></div>
    </div>

    <script type="module">
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        const resultsDiv = document.getElementById('results');

        let VitalLens;
        let stream = null;
        let wakeLock = null;

        function logDebug(msg) {
            console.log(msg);
            debugDiv.innerHTML = `${new Date().toLocaleTimeString()}: ${msg}<br>${debugDiv.innerHTML}`.slice(0, 500);
        }

        // Wrap in an async function to handle the library import safely
        (async function initApp() {
            logDebug('Application initializing...');

            // 1. Load the Library - USING BROWSER BUNDLE (includes all dependencies)
            try {
                // CRITICAL FIX: Use .browser.js instead of .esm.js
                // The browser bundle includes TensorFlow.js and all other dependencies
                const module = await import('https://cdn.jsdelivr.net/npm/vitallens@0.4.5/dist/vitallens.browser.js');
                VitalLens = module.VitalLens;
                logDebug('✓ VitalLens library loaded');
            } catch (err) {
                logDebug('❌ Library load failed: ' + err.message);
                statusDiv.textContent = '❌ Failed to load library';
                statusDiv.classList.add('error');
                return;
            }

            // 2. Camera Setup
            async function startCamera() {
                try {
                    logDebug('Requesting camera...');
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } 
                    });
                    video.srcObject = stream;
                    await new Promise((resolve) => video.onloadedmetadata = resolve);
                    await video.play();
                    logDebug('✓ Camera stream active');
                    return true;
                } catch (err) {
                    logDebug('❌ Camera error: ' + err.message);
                    statusDiv.textContent = '❌ Camera error: ' + err.message;
                    statusDiv.classList.add('error');
                    return false;
                }
            }

            // 3. Button Click Logic
            startBtn.onclick = async () => {
                logDebug('Button clicked. Starting sequence...');
                
                if (!window.isSecureContext) {
                    statusDiv.textContent = '❌ HTTPS Required';
                    statusDiv.classList.add('error');
                    return;
                }

                try {
                    if (!stream) {
                        const cameraOk = await startCamera();
                        if (!cameraOk) return;
                    }

                    // Request WakeLock to prevent phone sleep
                    if ('wakeLock' in navigator) {
                        try {
                            wakeLock = await navigator.wakeLock.request('screen');
                            logDebug('✓ Wake Lock active');
                        } catch (err) {
                            logDebug('⚠️ Wake Lock not available: ' + err.message);
                        }
                    }

                    statusDiv.textContent = '🔍 Scanning... Keep still (30s)';
                    statusDiv.classList.remove('error');
                    startBtn.disabled = true;

                    // IMPORTANT: REPLACE WITH YOUR FRESH API KEY
                    // Get one from https://rouast.com/api
                    const scanner = new VitalLens({
                        apiKey: 'YOUR_FRESH_API_KEY_HERE',  // <-- CHANGE THIS
                        method: 'vitallens'
                    });

                    logDebug('Running analysis...');
                    
                    // Add countdown timer for visual feedback
                    let secondsLeft = 30;
                    const countdownInterval = setInterval(() => {
                        secondsLeft--;
                        if (secondsLeft > 0) {
                            statusDiv.textContent = `🔍 Scanning... ${secondsLeft}s left`;
                        } else {
                            clearInterval(countdownInterval);
                        }
                    }, 1000);
                    
                    const scanPromise = scanner.analyze(video, { duration: 30000 });
                    const timeoutPromise = new Promise((_, reject) => 
                        setTimeout(() => reject(new Error('Network timeout (45s)')), 45000)
                    );

                    const result = await Promise.race([scanPromise, timeoutPromise]);
                    clearInterval(countdownInterval);
                    logDebug('✓ Analysis complete');

                    // Extract and Display
                    const hr = result.heartRate || result.vitals?.heart_rate?.value;
                    const hrv = result.hrv || result.vitals?.hrv_sdnn?.value;
                    const rr = result.respiratoryRate || result.vitals?.respiratory_rate?.value;
                    
                    // Calculate stress from HRV (lower HRV = higher stress)
                    let stress = '--';
                    if (hrv && !isNaN(hrv)) {
                        stress = Math.max(0, Math.min(100, Math.round(100 - (hrv / 80) * 100))) + '%';
                    }

                    document.getElementById('hr').innerHTML = Math.round(hr || 0) + ' <span style="font-size:14px;color:#6b7280;">BPM</span>';
                    document.getElementById('hrv').innerHTML = Math.round(hrv || 0) + ' <span style="font-size:14px;color:#6b7280;">ms</span>';
                    document.getElementById('rr').innerHTML = Math.round(rr || 0) + ' <span style="font-size:14px;color:#6b7280;">/min</span>';
                    document.getElementById('stress').innerHTML = stress;
                    
                    resultsDiv.classList.add('show');
                    statusDiv.textContent = '✅ Scan complete!';
                    statusDiv.classList.remove('error');

                } catch (err) {
                    logDebug('❌ Error: ' + err.message);
                    
                    let userMessage = err.message;
                    if (userMessage.includes('403') || userMessage.includes('Unauthorized')) {
                        userMessage = 'Invalid API key. Get a fresh key from rouast.com/api';
                    } else if (userMessage.includes('429')) {
                        userMessage = 'API rate limit exceeded. Try again later.';
                    } else if (userMessage.includes('timeout')) {
                        userMessage = 'Network timeout. Check your internet connection.';
                    }
                    
                    statusDiv.textContent = '❌ ' + userMessage;
                    statusDiv.classList.add('error');
                } finally {
                    startBtn.disabled = false;
                    if (wakeLock) {
                        try {
                            await wakeLock.release();
                            wakeLock = null;
                            logDebug('Wake Lock released');
                        } catch (err) {
                            // Ignore release errors
                        }
                    }
                }
            };

            logDebug('✓ Setup finished. Ready.');
        })();
    </script>
</body>
</html>
