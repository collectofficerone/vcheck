<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VitalCheck – Mobile Working</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(145deg, #0a0f1d 0%, #0f1629 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { max-width: 550px; width: 100%; background: rgba(255,255,255,0.05); border-radius: 48px; padding: 24px; }
        h1 { font-size: 32px; text-align: center; background: linear-gradient(135deg, #60a5fa, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .subhead { text-align: center; color: #9ca3af; font-size: 14px; margin-bottom: 20px; }
        #scanContainer { 
            width: 100%; 
            min-height: 400px; 
            background: rgba(0,0,0,0.3); 
            border-radius: 24px; 
            overflow: hidden;
            margin: 20px 0;
        }
        vitallens-scan {
            display: block;
            width: 100%;
            height: 100%;
        }
        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #3b82f6, #8b5cf6); 
            border: none; 
            border-radius: 48px; 
            color: white; 
            font-size: 18px; 
            font-weight: 600; 
            cursor: pointer; 
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .result { margin-top: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 24px; display: none; }
        .result.show { display: block; }
        .metric { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .metric:last-child { border-bottom: none; }
        .status { text-align: center; margin: 16px 0; color: #86efac; font-size: 14px; }
        .status.error { color: #f87171; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 VitalCheck</h1>
        <div class="subhead">Powered by VitalLens • 30 seconds • No app required</div>
        
        <div id="scanContainer">
            <vitallens-scan 
                id="vitalScan"
                api-key="poY83wP0pI5rOTK1mUS4d3EzmqOmsEF1nh6yD3fa"
                method="vitallens">
            </vitallens-scan>
        </div>
        
        <div id="status" class="status">🔌 Loading VitalLens...</div>
        
        <div id="results" class="result">
            <div class="metric"><span>❤️ Heart Rate</span><span id="hr">-- BPM</span></div>
            <div class="metric"><span>🔄 HRV (SDNN)</span><span id="hrv">-- ms</span></div>
            <div class="metric"><span>🌬️ Respiration</span><span id="rr">-- /min</span></div>
            <div class="metric"><span>⚡ Stress Level</span><span id="stress">-- %</span></div>
        </div>
        
        <div class="privacy-note" style="text-align: center; font-size: 11px; color: #4b5563; margin-top: 16px;">
            🔒 Video processed locally — frames are discarded immediately
        </div>
    </div>

    <script type="module">
        import 'https://cdn.jsdelivr.net/npm/vitallens@0.4.5/dist/vitallens.browser.js';
        
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        const scanner = document.getElementById('vitalScan');
        
        // Mobile detection
        const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        if (isMobile) {
            statusDiv.textContent = '📱 Mobile detected: Tap the VitalLens button below to start';
        }
        
        // Initialize once component is registered
        function initVitalLens() {
            console.log('✓ VitalLens component ready');
            statusDiv.textContent = isMobile ? '📱 Tap "Start Scan" below' : '✅ Ready. Click "Start Scan" below';
            statusDiv.classList.remove('error');
            
            // Remove old listeners
            scanner.removeEventListener('vitallens-result', handleResults);
            scanner.removeEventListener('vitallens-error', handleError);
            
            // Add listeners
            scanner.addEventListener('vitallens-result', handleResults);
            scanner.addEventListener('vitallens-error', handleError);
        }
        
        function handleResults(event) {
            const results = event.detail;
            console.log('Results:', results);
            
            // Extract values
            const hr = results.heartRate || results.vitals?.heart_rate?.value;
            const hrv = results.hrv || results.vitals?.hrv_sdnn?.value;
            const rr = results.respiratoryRate || results.vitals?.respiratory_rate?.value;
            
            // Calculate stress from HRV (lower HRV = higher stress)
            let stress = '--';
            if (hrv && !isNaN(hrv)) {
                stress = Math.max(0, Math.min(100, Math.round(100 - (hrv / 80) * 100))) + '%';
            }
            
            if (hr) document.getElementById('hr').innerHTML = Math.round(hr) + ' BPM';
            if (hrv) document.getElementById('hrv').innerHTML = Math.round(hrv) + ' ms';
            if (rr) document.getElementById('rr').innerHTML = Math.round(rr) + ' /min';
            if (stress !== '--') document.getElementById('stress').innerHTML = stress;
            
            resultsDiv.classList.add('show');
            statusDiv.textContent = '✅ Scan complete!';
        }
        
        function handleError(event) {
            console.error('VitalLens error:', event.detail);
            statusDiv.textContent = `⚠️ ${event.detail?.error || 'Scan failed. Ensure good lighting.'}`;
            statusDiv.classList.add('error');
        }
        
        // Wait for component registration
        if (customElements.get('vitallens-scan')) {
            initVitalLens();
        } else {
            customElements.whenDefined('vitallens-scan').then(initVitalLens);
        }
    </script>
</body>
</html>
