<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VitalCheck - Heart Rate Monitor (No Freeze)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0a0f1d 0%, #0f1629 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 32px;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subhead {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .instruction {
            background: rgba(96,165,250,0.1);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #cbd5e1;
        }
        .instruction span {
            background: #3b82f6;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            color: white;
            margin: 0 4px;
        }
        video {
            width: 100%;
            border-radius: 24px;
            background: #000;
            margin-bottom: 20px;
            aspect-ratio: 1;
            object-fit: cover;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 48px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            display: none;
        }
        .result.show { display: block; }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .metric:last-child { border-bottom: none; }
        .metric-label { color: #9ca3af; font-size: 14px; }
        .metric-value { font-size: 28px; font-weight: 700; color: #f3f4f6; }
        .status {
            text-align: center;
            margin: 16px 0;
            color: #86efac;
            font-size: 14px;
        }
        .status.error { color: #f87171; }
        .privacy-note {
            text-align: center;
            font-size: 11px;
            color: #4b5563;
            margin-top: 16px;
        }
        canvas {
            width: 100%;
            height: 80px;
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            margin-top: 16px;
        }
        .debug {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 8px;
            font-family: monospace;
            font-size: 9px;
            color: #6b7280;
            margin-top: 16px;
            text-align: left;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
        .signal-quality {
            text-align: center;
            font-size: 12px;
            margin-top: 8px;
            padding: 4px;
            border-radius: 20px;
        }
        .signal-good { background: rgba(34,197,94,0.2); color: #86efac; }
        .signal-poor { background: rgba(245,158,11,0.2); color: #fbbf24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 VitalCheck</h1>
        <div class="subhead">Fingertip measurement • 30 seconds</div>
        
        <div class="instruction">
            📱 <span>1</span> Place finger on back camera<br>
            <span>2</span> Cover the flash (Android only)<br>
            <span>3</span> Stay still for 30 seconds
        </div>
        
        <video id="video" autoplay playsinline muted></video>
        <button id="startBtn">Start Measurement</button>
        <div id="status" class="status">Ready</div>
        <div id="signalQuality" class="signal-quality"></div>
        
        <div id="results" class="result">
            <div class="metric">
                <span class="metric-label">❤️ Heart Rate</span>
                <span class="metric-value" id="hr">-- BPM</span>
            </div>
            <div class="metric">
                <span class="metric-label">🔄 HRV (SDNN)</span>
                <span class="metric-value" id="hrv">-- ms</span>
            </div>
        </div>
        
        <canvas id="waveform"></canvas>
        
        <div class="privacy-note">🔒 All processing happens on your device. No data uploaded. (SpO₂ removed - requires medical-grade hardware)</div>
        <div id="debug" class="debug"></div>
    </div>

    <script>
        // ============================================================
        // VITALCHECK - HEART RATE MONITOR (NON-BLOCKING)
        // Uses requestAnimationFrame - no UI freeze
        // ============================================================
        
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        const debugDiv = document.getElementById('debug');
        const canvas = document.getElementById('waveform');
        const ctx = canvas.getContext('2d');
        const signalQualityDiv = document.getElementById('signalQuality');
        
        let stream = null;
        let track = null;
        let recording = false;
        let animationId = null;
        let startTime = null;
        let redSignal = [];
        let timestamps = [];
        let frameCount = 0;
        
        function logDebug(msg) {
            const time = new Date().toLocaleTimeString();
            console.log(`[${time}] ${msg}`);
            debugDiv.innerHTML = `${time}: ${msg}<br>${debugDiv.innerHTML}`;
            if (debugDiv.innerHTML.split('<br>').length > 30) {
                const lines = debugDiv.innerHTML.split('<br>');
                debugDiv.innerHTML = lines.slice(0, 25).join('<br>');
            }
        }
        
        // Initialize camera
        async function initCamera() {
            try {
                logDebug('Requesting back camera...');
                statusDiv.textContent = '📷 Opening back camera...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: 'environment' },
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                
                video.srcObject = stream;
                await new Promise((resolve) => video.onloadedmetadata = resolve);
                await video.play();
                
                track = stream.getVideoTracks()[0];
                if (track && track.getCapabilities().torch) {
                    await track.applyConstraints({ advanced: [{ torch: true }] });
                    logDebug('Flash enabled');
                } else {
                    logDebug('Flash not supported');
                }
                
                logDebug('Camera ready');
                statusDiv.textContent = '✅ Ready. Place finger on camera.';
                return true;
            } catch (err) {
                logDebug(`Camera error: ${err.message}`);
                statusDiv.textContent = '❌ Back camera required. Please allow access.';
                statusDiv.classList.add('error');
                return false;
            }
        }
        
        // Extract PPG signal from finger
        function capturePPG() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, 0, 0);
            
            const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            const data = imageData.data;
            
            // Sample center region
            const centerX = Math.floor(tempCanvas.width / 2);
            const centerY = Math.floor(tempCanvas.height / 2);
            const radius = Math.floor(Math.min(tempCanvas.width, tempCanvas.height) / 5);
            
            let redSum = 0;
            let greenSum = 0;
            let count = 0;
            
            for (let y = centerY - radius; y <= centerY + radius; y++) {
                for (let x = centerX - radius; x <= centerX + radius; x++) {
                    if (x >= 0 && x < tempCanvas.width && y >= 0 && y < tempCanvas.height) {
                        const idx = (y * tempCanvas.width + x) * 4;
                        redSum += data[idx];
                        greenSum += data[idx + 1];
                        count++;
                    }
                }
            }
            
            return { red: redSum / count, green: greenSum / count };
        }
        
        // Draw waveform
        function drawWaveform(signal) {
            if (!ctx) return;
            canvas.width = canvas.clientWidth;
            canvas.height = 80;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#22d3ee';
            ctx.lineWidth = 2;
            
            if (signal.length < 2) return;
            
            const slice = signal.slice(-canvas.width);
            const min = Math.min(...slice);
            const max = Math.max(...slice);
            const range = max - min || 1;
            
            for (let i = 0; i < slice.length; i++) {
                const x = i;
                const y = canvas.height - ((slice[i] - min) / range) * canvas.height;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }
        
        // Calculate heart rate using peak detection
        function calculateHeartRate(signal, sampleRate) {
            if (signal.length < sampleRate * 2) {
                return { hr: null, hrv: null, error: 'Insufficient data' };
            }
            
            // Find peaks
            const peaks = [];
            const mean = signal.reduce((a,b) => a + b, 0) / signal.length;
            const std = Math.sqrt(signal.map(x => Math.pow(x - mean, 2)).reduce((a,b) => a + b, 0) / signal.length);
            const threshold = mean + std * 0.5;
            
            for (let i = 2; i < signal.length - 2; i++) {
                if (signal[i] > threshold &&
                    signal[i] > signal[i-1] && signal[i] > signal[i-2] &&
                    signal[i] > signal[i+1] && signal[i] > signal[i+2]) {
                    peaks.push(i);
                }
            }
            
            if (peaks.length < 3) {
                return { hr: null, hrv: null, error: 'Insufficient peaks' };
            }
            
            // Calculate RR intervals
            const rrIntervals = [];
            for (let i = 1; i < peaks.length; i++) {
                rrIntervals.push((peaks[i] - peaks[i-1]) / sampleRate);
            }
            
            // Remove outliers
            const meanRR = rrIntervals.reduce((a,b) => a + b, 0) / rrIntervals.length;
            const validRR = rrIntervals.filter(rr => Math.abs(rr - meanRR) < meanRR * 0.3);
            
            if (validRR.length < 2) {
                return { hr: null, hrv: null, error: 'No valid RR intervals' };
            }
            
            const avgRR = validRR.reduce((a,b) => a + b, 0) / validRR.length;
            const hr = Math.round(60 / avgRR);
            
            // HRV - RMSSD
            let sumSquaredDiffs = 0;
            for (let i = 1; i < validRR.length; i++) {
                const diff = validRR[i] - validRR[i-1];
                sumSquaredDiffs += diff * diff;
            }
            const rmssd = Math.sqrt(sumSquaredDiffs / (validRR.length - 1)) * 1000;
            
            // Confidence based on peak consistency
            const confidence = Math.min(95, Math.round((validRR.length / rrIntervals.length) * 100));
            
            return { hr, hrv: Math.round(rmssd), confidence };
        }
        
        // Main capture loop using requestAnimationFrame (non-blocking)
        function captureLoop() {
            if (!recording) return;
            
            const now = Date.now();
            const elapsed = now - startTime;
            
            // Update countdown display
            const secondsLeft = Math.max(0, 30 - Math.floor(elapsed / 1000));
            statusDiv.textContent = `🔴 Measuring... ${secondsLeft}s left. Keep finger still.`;
            
            // Capture frame
            const ppg = capturePPG();
            redSignal.push(ppg.red);
            timestamps.push(now);
            frameCount++;
            
            // Update waveform every few frames
            if (frameCount % 5 === 0) {
                drawWaveform(redSignal);
                
                // Show signal quality
                if (redSignal.length > 30) {
                    const recent = redSignal.slice(-30);
                    const variance = recent.reduce((a,b) => a + Math.pow(b - (recent.reduce((x,y) => x + y, 0)/30), 2), 0) / 30;
                    if (variance < 5) {
                        signalQualityDiv.textContent = '⚠️ Low signal. Press finger firmly.';
                        signalQualityDiv.className = 'signal-quality signal-poor';
                    } else if (variance > 20) {
                        signalQualityDiv.textContent = '✅ Good signal. Keep still.';
                        signalQualityDiv.className = 'signal-quality signal-good';
                    } else {
                        signalQualityDiv.textContent = '📊 Signal OK. Continue holding.';
                        signalQualityDiv.className = 'signal-quality';
                    }
                }
            }
            
            // Check if done
            if (elapsed >= 30000) {
                endMeasurement();
                return;
            }
            
            // Schedule next frame
            animationId = requestAnimationFrame(captureLoop);
        }
        
        async function endMeasurement() {
            recording = false;
            if (animationId) cancelAnimationFrame(animationId);
            
            logDebug(`Captured ${redSignal.length} frames in ${timestamps[timestamps.length-1] - timestamps[0]}ms`);
            
            // Calculate actual sample rate
            const actualDuration = (timestamps[timestamps.length-1] - timestamps[0]) / 1000;
            const sampleRate = redSignal.length / actualDuration;
            logDebug(`Actual sample rate: ${sampleRate.toFixed(2)} FPS`);
            
            // Detrend and normalize signal
            const mean = redSignal.reduce((a,b) => a + b, 0) / redSignal.length;
            const detrended = redSignal.map(x => x - mean);
            const maxVal = Math.max(...detrended.map(Math.abs));
            const normalized = detrended.map(x => x / maxVal);
            
            // Calculate results
            const result = calculateHeartRate(normalized, sampleRate);
            
            if (result.hr && result.hr >= 40 && result.hr <= 180) {
                document.getElementById('hr').innerHTML = result.hr + ' BPM';
                document.getElementById('hrv').innerHTML = result.hrv + ' ms';
                
                resultsDiv.classList.add('show');
                
                if (result.confidence > 70) {
                    statusDiv.textContent = '✅ Measurement complete!';
                    statusDiv.classList.remove('error');
                } else {
                    statusDiv.textContent = '⚠️ Complete. Try again for better accuracy.';
                    statusDiv.classList.add('error');
                }
                
                logDebug(`Results: HR=${result.hr}, HRV=${result.hrv}, Confidence=${result.confidence}%`);
            } else {
                statusDiv.textContent = '❌ Could not detect pulse. Make sure finger covers lens completely.';
                statusDiv.classList.add('error');
                logDebug('Pulse detection failed');
            }
            
            // Hide video, show guide again
            video.style.display = 'none';
            document.getElementById('fingerGuide')?.remove();
            
            startBtn.disabled = false;
            startBtn.textContent = 'Start Measurement';
        }
        
        async function startMeasurement() {
            if (recording) return;
            
            logDebug('Starting measurement...');
            
            if (!stream) {
                const ok = await initCamera();
                if (!ok) return;
            }
            
            // Reset data
            redSignal = [];
            timestamps = [];
            frameCount = 0;
            recording = true;
            startBtn.disabled = true;
            startBtn.textContent = 'Measuring...';
            resultsDiv.classList.remove('show');
            signalQualityDiv.textContent = '';
            signalQualityDiv.className = 'signal-quality';
            
            // Show video
            video.style.display = 'block';
            
            // Wait a moment for camera to adjust
            await new Promise(resolve => setTimeout(resolve, 500));
            
            startTime = Date.now();
            captureLoop();
        }
        
        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (track && track.getCapabilities().torch) {
                track.applyConstraints({ advanced: [{ torch: false }] });
            }
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            if (animationId) cancelAnimationFrame(animationId);
        });
        
        startBtn.onclick = startMeasurement;
        
        // Initialize
        if (window.isSecureContext) {
            initCamera();
        } else {
            statusDiv.textContent = '❌ HTTPS required';
            statusDiv.classList.add('error');
        }
    </script>
</body>
</html>
