<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VitalCheck - Heart Rate Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0a0f1d 0%, #0f1629 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 32px;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subhead {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .instruction {
            background: rgba(96,165,250,0.1);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #cbd5e1;
        }
        .instruction span {
            background: #3b82f6;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            color: white;
            margin: 0 4px;
        }
        video {
            width: 100%;
            border-radius: 24px;
            background: #000;
            margin-bottom: 20px;
            aspect-ratio: 1;
            object-fit: cover;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 48px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .result {
            margin-top: 20px;
            padding: 24px;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            display: none;
            text-align: center;
        }
        .result.show { display: block; }
        .heart-rate {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }
        .heart-label {
            color: #9ca3af;
            font-size: 16px;
            margin-top: 8px;
        }
        .status {
            text-align: center;
            margin: 16px 0;
            color: #86efac;
            font-size: 14px;
        }
        .status.error { color: #f87171; }
        .privacy-note {
            text-align: center;
            font-size: 11px;
            color: #4b5563;
            margin-top: 16px;
        }
        canvas {
            width: 100%;
            height: 80px;
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            margin-top: 16px;
        }
        .debug {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 8px;
            font-family: monospace;
            font-size: 9px;
            color: #6b7280;
            margin-top: 16px;
            text-align: left;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
        .signal-quality {
            text-align: center;
            font-size: 12px;
            margin-top: 8px;
            padding: 4px;
            border-radius: 20px;
        }
        .signal-good { background: rgba(34,197,94,0.2); color: #86efac; }
        .signal-poor { background: rgba(245,158,11,0.2); color: #fbbf24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 VitalCheck</h1>
        <div class="subhead">Fingertip measurement • 30 seconds</div>
        
        <div class="instruction">
            📱 <span>1</span> Place finger on BACK camera<br>
            <span>2</span> Cover the lens completely<br>
            <span>3</span> Hold VERY still for 30 seconds
        </div>
        
        <video id="video" autoplay playsinline muted></video>
        <button id="startBtn">Start Measurement</button>
        <div id="status" class="status">Ready</div>
        <div id="signalQuality" class="signal-quality"></div>
        
        <div id="results" class="result">
            <div class="heart-rate" id="hr">--</div>
            <div class="heart-label">Beats per minute</div>
        </div>
        
        <canvas id="waveform"></canvas>
        
        <div class="privacy-note">🔒 All processing happens on your device. No data uploaded.</div>
        <div id="debug" class="debug"></div>
    </div>

    <script>
        // ============================================================
        // VITALCHECK - HEART RATE ONLY
        // Simple, fast, no freeze, no HRV
        // ============================================================
        
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        const debugDiv = document.getElementById('debug');
        const canvas = document.getElementById('waveform');
        const ctx = canvas.getContext('2d');
        const signalQualityDiv = document.getElementById('signalQuality');
        
        let stream = null;
        let track = null;
        let recording = false;
        let captureInterval = null;
        let startTime = null;
        let redSignal = [];
        let timestamps = [];
        
        function logDebug(msg) {
            const time = new Date().toLocaleTimeString();
            console.log(`[${time}] ${msg}`);
            debugDiv.innerHTML = `${time}: ${msg}<br>${debugDiv.innerHTML}`;
            if (debugDiv.innerHTML.split('<br>').length > 30) {
                const lines = debugDiv.innerHTML.split('<br>');
                debugDiv.innerHTML = lines.slice(0, 25).join('<br>');
            }
        }
        
        // Initialize camera
        async function initCamera() {
            try {
                logDebug('Requesting back camera...');
                statusDiv.textContent = '📷 Opening back camera...';
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: 'environment' },
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                
                video.srcObject = stream;
                await new Promise((resolve) => video.onloadedmetadata = resolve);
                await video.play();
                
                track = stream.getVideoTracks()[0];
                if (track && track.getCapabilities().torch) {
                    await track.applyConstraints({ advanced: [{ torch: true }] });
                    logDebug('Flash enabled');
                } else {
                    logDebug('Flash not supported');
                }
                
                logDebug('Camera ready');
                statusDiv.textContent = '✅ Ready. Place finger on camera.';
                return true;
            } catch (err) {
                logDebug(`Camera error: ${err.message}`);
                statusDiv.textContent = '❌ Back camera required. Please allow access.';
                statusDiv.classList.add('error');
                return false;
            }
        }
        
        // Extract PPG signal
        function capturePPG() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, 0, 0);
            
            const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            const data = imageData.data;
            
            const centerX = Math.floor(tempCanvas.width / 2);
            const centerY = Math.floor(tempCanvas.height / 2);
            const radius = Math.floor(Math.min(tempCanvas.width, tempCanvas.height) / 5);
            
            let redSum = 0;
            let count = 0;
            
            for (let y = centerY - radius; y <= centerY + radius; y++) {
                for (let x = centerX - radius; x <= centerX + radius; x++) {
                    if (x >= 0 && x < tempCanvas.width && y >= 0 && y < tempCanvas.height) {
                        const idx = (y * tempCanvas.width + x) * 4;
                        redSum += data[idx];
                        count++;
                    }
                }
            }
            
            return redSum / count;
        }
        
        // Draw waveform
        function drawWaveform(signal) {
            if (!ctx) return;
            canvas.width = canvas.clientWidth;
            canvas.height = 80;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#22d3ee';
            ctx.lineWidth = 2;
            
            if (signal.length < 2) return;
            
            const slice = signal.slice(-canvas.width);
            const min = Math.min(...slice);
            const max = Math.max(...slice);
            const range = max - min || 1;
            
            for (let i = 0; i < slice.length; i++) {
                const x = i;
                const y = canvas.height - ((slice[i] - min) / range) * canvas.height;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }
        
        // Simple peak detection for heart rate
        function calculateHeartRate(signal, sampleRate) {
            if (signal.length < sampleRate * 2) {
                return null;
            }
            
            // Find peaks
            const peaks = [];
            const mean = signal.reduce((a,b) => a + b, 0) / signal.length;
            const std = Math.sqrt(signal.map(x => Math.pow(x - mean, 2)).reduce((a,b) => a + b, 0) / signal.length);
            const threshold = mean + std * 0.5;
            
            for (let i = 2; i < signal.length - 2; i++) {
                if (signal[i] > threshold &&
                    signal[i] > signal[i-1] && signal[i] > signal[i-2] &&
                    signal[i] > signal[i+1] && signal[i] > signal[i+2]) {
                    peaks.push(i);
                }
            }
            
            if (peaks.length < 3) {
                return null;
            }
            
            // Calculate average RR interval
            let totalInterval = 0;
            for (let i = 1; i < peaks.length; i++) {
                totalInterval += (peaks[i] - peaks[i-1]) / sampleRate;
            }
            const avgRR = totalInterval / (peaks.length - 1);
            
            let hr = Math.round(60 / avgRR);
            
            // Cap to realistic range
            if (hr < 40) hr = 40;
            if (hr > 180) hr = 180;
            
            return hr;
        }
        
        // Capture loop
        function captureFrame() {
            if (!recording) return;
            
            const now = Date.now();
            const elapsed = now - startTime;
            
            const secondsLeft = Math.max(0, 30 - Math.floor(elapsed / 1000));
            statusDiv.textContent = `🔴 Measuring... ${secondsLeft}s left. Keep finger still.`;
            
            const value = capturePPG();
            redSignal.push(value);
            timestamps.push(now);
            
            // Update display every 10 frames
            if (redSignal.length % 10 === 0) {
                drawWaveform(redSignal);
                
                if (redSignal.length > 30) {
                    const recent = redSignal.slice(-30);
                    const mean = recent.reduce((a,b) => a + b, 0) / 30;
                    const variance = recent.reduce((a,b) => a + Math.pow(b - mean, 2), 0) / 30;
                    
                    if (variance < 3) {
                        signalQualityDiv.textContent = '⚠️ Poor signal. Press finger firmly.';
                        signalQualityDiv.className = 'signal-quality signal-poor';
                    } else if (variance > 15) {
                        signalQualityDiv.textContent = '✅ Good signal. Keep still.';
                        signalQualityDiv.className = 'signal-quality signal-good';
                    } else {
                        signalQualityDiv.textContent = '📊 Signal OK. Continue holding.';
                        signalQualityDiv.className = 'signal-quality';
                    }
                }
            }
            
            if (elapsed >= 30000) {
                endMeasurement();
            }
        }
        
        async function endMeasurement() {
            recording = false;
            if (captureInterval) {
                clearInterval(captureInterval);
                captureInterval = null;
            }
            
            logDebug(`Captured ${redSignal.length} frames`);
            
            const actualDuration = (timestamps[timestamps.length - 1] - timestamps[0]) / 1000;
            const sampleRate = redSignal.length / actualDuration;
            logDebug(`Sample rate: ${sampleRate.toFixed(2)} FPS`);
            
            // Detrend signal
            const mean = redSignal.reduce((a,b) => a + b, 0) / redSignal.length;
            const detrended = redSignal.map(x => x - mean);
            
            const hr = calculateHeartRate(detrended, sampleRate);
            
            if (hr && hr >= 40 && hr <= 180) {
                document.getElementById('hr').innerHTML = hr;
                resultsDiv.classList.add('show');
                statusDiv.textContent = '✅ Measurement complete!';
                statusDiv.classList.remove('error');
                logDebug(`Heart Rate: ${hr} BPM`);
            } else {
                statusDiv.textContent = '❌ Could not detect pulse. Make sure finger covers lens completely.';
                statusDiv.classList.add('error');
                logDebug('Pulse detection failed');
            }
            
            startBtn.disabled = false;
            startBtn.textContent = 'Start Measurement';
        }
        
        async function startMeasurement() {
            if (recording) return;
            
            logDebug('Starting measurement...');
            
            if (!stream) {
                const ok = await initCamera();
                if (!ok) return;
            }
            
            // Reset
            redSignal = [];
            timestamps = [];
            recording = true;
            startBtn.disabled = true;
            startBtn.textContent = 'Measuring...';
            resultsDiv.classList.remove('show');
            signalQualityDiv.textContent = '';
            signalQualityDiv.className = 'signal-quality';
            
            video.style.display = 'block';
            
            await new Promise(resolve => setTimeout(resolve, 500));
            
            startTime = Date.now();
            
            // Simple setInterval - no complex math that could freeze
            captureInterval = setInterval(captureFrame, 33);
        }
        
        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (track && track.getCapabilities().torch) {
                track.applyConstraints({ advanced: [{ torch: false }] });
            }
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            if (captureInterval) {
                clearInterval(captureInterval);
            }
        });
        
        startBtn.onclick = startMeasurement;
        
        if (window.isSecureContext) {
            initCamera();
        } else {
            statusDiv.textContent = '❌ HTTPS required';
            statusDiv.classList.add('error');
        }
    </script>
</body>
</html>
