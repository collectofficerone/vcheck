<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VitalCheck – Complete Fixed Version</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0a0f1d 0%, #0f1629 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 32px;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subhead {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        /* VitalLens component styling */
        vitallens-scan {
            display: block;
            width: 100%;
            min-height: 450px;
            background: rgba(0,0,0,0.3);
            border-radius: 32px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 48px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            display: none;
        }
        .result.show { display: block; }
        
        .metric {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .metric:last-child { border-bottom: none; }
        .metric-label { color: #9ca3af; font-size: 14px; }
        .metric-value { font-size: 28px; font-weight: 700; color: #f3f4f6; }
        .metric-unit { font-size: 12px; color: #6b7280; font-weight: normal; }
        
        .status {
            text-align: center;
            margin: 16px 0;
            color: #86efac;
            font-size: 14px;
        }
        .status.error { color: #f87171; }
        .status.warning { color: #fbbf24; }
        
        .privacy-note {
            text-align: center;
            font-size: 11px;
            color: #4b5563;
            margin-top: 16px;
        }
        
        .debug {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #86efac;
            margin-top: 16px;
            text-align: left;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .reset-btn {
            background: rgba(96,165,250,0.2);
            border: 1px solid rgba(96,165,250,0.5);
            margin-top: 12px;
            display: none;
        }
        .reset-btn:hover { background: rgba(96,165,250,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 VitalCheck</h1>
        <div class="subhead">30-second health scan • No app required • Works on mobile</div>
        
        <!-- VitalLens Web Component - handles camera, face detection, and scanning -->
        <vitallens-scan 
            id="vitalScan"
            api-key="YOUR_FRESH_API_KEY_HERE"
            method="vitallens">
        </vitallens-scan>
        
        <div id="status" class="status">Ready</div>
        
        <div id="results" class="result">
            <div class="metric">
                <span class="metric-label">❤️ Heart Rate</span>
                <span class="metric-value" id="hrValue">-- <span class="metric-unit">BPM</span></span>
            </div>
            <div class="metric">
                <span class="metric-label">🔄 HRV (SDNN)</span>
                <span class="metric-value" id="hrvValue">-- <span class="metric-unit">ms</span></span>
            </div>
            <div class="metric">
                <span class="metric-label">🌬️ Respiratory Rate</span>
                <span class="metric-value" id="rrValue">-- <span class="metric-unit">/min</span></span>
            </div>
            <div class="metric">
                <span class="metric-label">⚡ Stress Level</span>
                <span class="metric-value" id="stressValue">-- <span class="metric-unit">%</span></span>
            </div>
        </div>
        
        <button id="resetBtn" class="reset-btn">Start New Scan</button>
        
        <div class="privacy-note">🔒 Video processed locally — frames are discarded immediately</div>
        <div id="debug" class="debug"></div>
    </div>

    <script type="module">
        // Import the browser bundle - this auto-registers the <vitallens-scan> component
        import 'https://cdn.jsdelivr.net/npm/vitallens@0.4.5/dist/vitallens.browser.js';
        
        // DOM elements
        const debugDiv = document.getElementById('debug');
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        const resetBtn = document.getElementById('resetBtn');
        const scanner = document.getElementById('vitalScan');
        
        // Helper: log to debug panel
        function logDebug(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : (type === 'success' ? '✅' : '📌');
            console.log(`[${timestamp}] ${prefix} ${msg}`);
            debugDiv.innerHTML = `${timestamp}: ${prefix} ${msg}<br>${debugDiv.innerHTML}`;
            
            // Keep last 30 lines
            const lines = debugDiv.innerHTML.split('<br>');
            if (lines.length > 35) {
                debugDiv.innerHTML = lines.slice(0, 30).join('<br>');
            }
        }
        
        // Check secure context first
        if (!window.isSecureContext) {
            logDebug('HTTPS required - camera access blocked', 'error');
            statusDiv.textContent = '❌ HTTPS required for camera access';
            statusDiv.classList.add('error');
        } else {
            logDebug('Secure context (HTTPS) detected', 'success');
        }
        
        // Wait for the web component to be registered
        async function init() {
            logDebug('Waiting for vitallens-scan component...');
            
            try {
                await customElements.whenDefined('vitallens-scan');
                logDebug('Component registered successfully', 'success');
                statusDiv.textContent = '✅ Ready. Tap the VitalLens button above to start.';
                
                // Listen for scan results
                scanner.addEventListener('vitallens-result', handleResults);
                scanner.addEventListener('vitallens-error', handleError);
                scanner.addEventListener('vitallens-start', handleStart);
                
                // Verify the component is interactive
                logDebug('Event listeners attached. Waiting for user interaction.');
                
            } catch (err) {
                logDebug(`Component registration failed: ${err.message}`, 'error');
                statusDiv.textContent = '❌ Failed to load VitalLens component';
                statusDiv.classList.add('error');
            }
        }
        
        function handleStart() {
            logDebug('Scan started - 30 seconds', 'success');
            statusDiv.textContent = '🔍 Scanning... Please stay still (30s)';
            statusDiv.classList.remove('error');
            resultsDiv.classList.remove('show');
        }
        
        function handleResults(event) {
            const results = event.detail;
            logDebug(`Results received: ${JSON.stringify(results).substring(0, 200)}`, 'success');
            
            // Extract vital signs (handles both flat and nested structures)
            const heartRate = results.heartRate || results.vitals?.heart_rate?.value;
            const hrv = results.hrv || results.vitals?.hrv_sdnn?.value;
            const respRate = results.respiratoryRate || results.vitals?.respiratory_rate?.value;
            
            // Calculate stress level from HRV (lower HRV = higher stress)
            let stress = '--';
            if (hrv && !isNaN(hrv)) {
                const stressNum = Math.max(0, Math.min(100, Math.round(100 - (hrv / 80) * 100)));
                stress = stressNum + '%';
            }
            
            // Update UI
            if (heartRate) {
                document.getElementById('hrValue').innerHTML = Math.round(heartRate) + ' <span class="metric-unit">BPM</span>';
            }
            if (hrv) {
                document.getElementById('hrvValue').innerHTML = Math.round(hrv) + ' <span class="metric-unit">ms</span>';
            }
            if (respRate) {
                document.getElementById('rrValue').innerHTML = Math.round(respRate) + ' <span class="metric-unit">/min</span>';
            }
            if (stress !== '--') {
                document.getElementById('stressValue').innerHTML = stress;
            }
            
            // Show results panel
            resultsDiv.classList.add('show');
            resetBtn.style.display = 'block';
            statusDiv.textContent = '✅ Scan complete!';
            logDebug('Display updated successfully', 'success');
        }
        
        function handleError(event) {
            const errorDetail = event.detail;
            const errorMsg = errorDetail?.error || errorDetail?.message || 'Unknown error';
            logDebug(`Scan error: ${errorMsg}`, 'error');
            
            // Provide specific guidance based on error
            if (errorMsg.includes('403') || errorMsg.includes('unauthorized') || errorMsg.includes('key')) {
                statusDiv.textContent = '❌ Invalid API key. Get a fresh key from rouast.com/api';
            } else if (errorMsg.includes('429')) {
                statusDiv.textContent = '❌ Rate limit exceeded. Try again later.';
            } else if (errorMsg.includes('camera') || errorMsg.includes('permission')) {
                statusDiv.textContent = '❌ Camera permission denied. Please allow camera access.';
            } else if (errorMsg.includes('lighting')) {
                statusDiv.textContent = '⚠️ Poor lighting detected. Move to a well-lit area.';
            } else {
                statusDiv.textContent = `❌ Scan failed: ${errorMsg.substring(0, 100)}`;
            }
            statusDiv.classList.add('error');
            
            // Show reset option
            resetBtn.style.display = 'block';
        }
        
        // Reset functionality
        resetBtn.addEventListener('click', () => {
            resultsDiv.classList.remove('show');
            resetBtn.style.display = 'none';
            statusDiv.textContent = '✅ Ready. Tap the VitalLens button above to start a new scan.';
            statusDiv.classList.remove('error');
            logDebug('Reset - ready for new scan');
            
            // Attempt to reset the component if it has a reset method
            if (scanner.reset) {
                scanner.reset();
            }
        });
        
        // Start initialization
        init();
    </script>
</body>
</html>
